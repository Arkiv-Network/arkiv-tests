name: arkiv-pos-devnet

# Single-validator PoS devnet: arkiv reth (execution) + Lighthouse beacon +
# Lighthouse validator. Forks active through Electra/Prague (Fulu disabled).
# Run ./generate.sh first to produce ./output, ./testnet and ./validators.

services:
  reth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARKIV_RETH_TAG: ${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    image: arkiv-pure-reth-sequencer:${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    container_name: arkiv-pos-reth
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/run-el.sh"]
    environment:
      BLOCK_GAS_LIMIT: ${BLOCK_GAS_LIMIT:-30000000}
      TXPOOL_MIN_PRIORITY_FEE: ${TXPOOL_MIN_PRIORITY_FEE:-}
      TXPOOL_MIN_PROTOCOL_FEE: ${TXPOOL_MIN_PROTOCOL_FEE:-}
    volumes:
      - ./run-el.sh:/run-el.sh:ro
      - ./output/metadata/genesis.json:/genesis/genesis.json:ro
      - ./output/jwt/jwtsecret:/jwt/jwtsecret:ro
      - reth-data:/data
    ports:
      - "${RPC_PORT:-8545}:8545"
      - "${WS_PORT:-8546}:8546"
      - "${METRICS_PORT:-6160}:6160"

  beacon:
    image: sigp/lighthouse:${LIGHTHOUSE_TAG:-v8.0.0}
    container_name: arkiv-pos-beacon
    restart: unless-stopped
    depends_on: [reth]
    command:
      - lighthouse
      - beacon_node
      - --testnet-dir=/testnet
      - --datadir=/data
      - --execution-endpoint=http://reth:8551
      - --execution-jwt=/jwt/jwtsecret
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --http-allow-origin=*
      - --target-peers=0
      - --disable-packet-filter
      - --disable-peer-scoring
      # Single node with no peers: subscribe to all attestation subnets so the
      # validator's own attestations get included in blocks (otherwise FFG never
      # justifies/finalizes).
      - --subscribe-all-subnets
      - --allow-insecure-genesis-sync
      - --disable-optimistic-finalized-sync
      - --suggested-fee-recipient=${OPERATOR_ADDRESS:?OPERATOR_ADDRESS must be set in .env}
    volumes:
      - ./testnet:/testnet:ro
      - ./output/jwt/jwtsecret:/jwt/jwtsecret:ro
      - beacon-data:/data
    ports:
      - "${BEACON_HTTP_PORT:-5052}:5052"

  validator:
    image: sigp/lighthouse:${LIGHTHOUSE_TAG:-v8.0.0}
    container_name: arkiv-pos-validator
    restart: unless-stopped
    depends_on: [beacon]
    command:
      - lighthouse
      - validator_client
      - --testnet-dir=/testnet
      - --beacon-nodes=http://beacon:5052
      - --validators-dir=/keys
      - --secrets-dir=/secrets
      - --init-slashing-protection
      - --suggested-fee-recipient=${OPERATOR_ADDRESS:?OPERATOR_ADDRESS must be set in .env}
    volumes:
      - ./testnet:/testnet:ro
      # Lighthouse writes validator_definitions.yaml + slashing protection here,
      # so /keys must be writable.
      - ./validators/gen/keys:/keys
      - ./validators/gen/secrets:/secrets:ro

volumes:
  reth-data:
  beacon-data:
  validator-data:
