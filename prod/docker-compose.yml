name: arkiv-prod

services:
  sequencer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARKIV_RETH_TAG: ${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    image: arkiv-pure-reth-sequencer:${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    container_name: arkiv-pure-reth-sequencer
    restart: unless-stopped
    environment:
      CHAIN_ID: ${CHAIN_ID:-42069}
      BLOCK_TIME_SECONDS: ${BLOCK_TIME_SECONDS:-2}
      BLOCK_GAS_LIMIT: ${BLOCK_GAS_LIMIT:-30000000}
      DEV_MNEMONIC: ${DEV_MNEMONIC:-parent picture garment parrot churn record stadium pill rocket craft fish fiscal clip virus view diary replace wealth extra kitten door enforce piece nut}
      ARKIV_RETH_DATA_DIR: /var/lib/arkiv-reth
      ARKIV_RETH_RPC_ADDR: 0.0.0.0
      ARKIV_RETH_RPC_PORT: 8545
      ARKIV_RETH_WS_ADDR: 0.0.0.0
      ARKIV_RETH_WS_PORT: 8546
      ARKIV_RETH_METRICS_ADDR: 0.0.0.0:6160
      ARKIV_RETH_GENESIS_PATH: /genesis/genesis.json
    ports:
      - "${RPC_PORT:-8545}:8545"
      - "${WS_PORT:-8546}:8546"
      - "${METRICS_PORT:-6160}:6160"
    volumes:
      - ./data:/var/lib/arkiv-reth
      - ./genesis:/genesis:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; request = urllib.request.Request('http://127.0.0.1:8545', data=b'{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}', headers={'Content-Type':'application/json'}); response = urllib.request.urlopen(request, timeout=2); raise SystemExit(0 if json.load(response).get('result') else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  genesis-generator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARKIV_RETH_TAG: ${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    image: arkiv-pure-reth-sequencer:${ARKIV_RETH_TAG:-v0.1.0-pure-0}
    profiles:
      - tools
    environment:
      PURE_RETH_CHAIN_ID: ${CHAIN_ID:-42069}
      PURE_RETH_BLOCK_TIME_SECONDS: ${BLOCK_TIME_SECONDS:-2}
      PURE_RETH_GAS_LIMIT: ${BLOCK_GAS_LIMIT:-30000000}
      PURE_RETH_GENESIS_PATH: /genesis/genesis.json
    volumes:
      - ./genesis:/genesis
    entrypoint: ["/bin/bash", "generate-genesis-entrypoint.sh"]
